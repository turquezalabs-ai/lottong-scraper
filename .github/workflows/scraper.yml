name: PCSO Lotto Scraper (Debug)

on:
  schedule:
    - cron: '10 6 * * *'
    - cron: '10 9 * * *'
    - cron: '10 13 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Browser Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1

      - name: Install NPM Packages
        run: npm install

      # DEBUG: List files to ensure scripts exist
      - name: List Files
        run: ls -R

      # LOGIC: Decide which script to run
      - name: Determine Scraper
        id: pick
        run: |
          HOUR=$(date -u +%H)
          echo "Current UTC Hour: $HOUR"
          if [[ "$HOUR" == "15" ]]; then
            echo "script=scrape.js" >> $GITHUB_OUTPUT
          else
            echo "script=scrape_live.js" >> $GITHUB_OUTPUT
          fi

      # RUN: Execute the chosen script
      - name: Run Scraper
        run: node ${{ steps.pick.outputs.script }}

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: /public_html/
