name: PCSO Lotto Scraper (Dual Schedule)

on:
  schedule:
    # 1. REAL-TIME SCHEDULE (Manila Time)
    # 2:10 PM = 06:10 UTC
    - cron: '10 6 * * *'
    # 5:10 PM = 09:10 UTC
    - cron: '10 9 * * *'
    # 9:10 PM = 13:10 UTC
    - cron: '10 13 * * *'
    
    # 2. OFFICIAL FULL SCHEDULE (Manila Time)
    # 11:00 PM = 15:00 UTC
    - cron: '0 15 * * *'
    
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 libatspi2.0-0 libxshmfence1
          npm install

      # Logic to decide which script to run based on time
      - name: Determine Scraper
        id: pick
        run: |
          HOUR=$(date -u +%H)
          echo "Current UTC Hour: $HOUR"
          # 15:00 UTC = 11 PM Manila -> Run Official Scraper
          if [[ "$HOUR" == "15" ]]; then
            echo "script=scrape.js" >> $GITHUB_OUTPUT
          else
            # All other times (2PM, 5PM, 9PM) -> Run Live Scraper
            echo "script=scrape_live.js" >> $GITHUB_OUTPUT
          fi

      - name: Run Scraper
        run: node ${{ steps.pick.outputs.script }}

      - name: Upload to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./data/
          server-dir: /public_html/
